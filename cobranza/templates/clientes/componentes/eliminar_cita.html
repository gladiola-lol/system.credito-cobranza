{% extends 'clientes/base.html'%}

{% block title %}Eliminar cita {% endblock %}

{% block content %}
<h2>Seguro que quieres eliminar esta cita?</h2>
<p>
    {{object.cliente}} - {{object.fecha}} - {{object.hora}}
</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Eliminar</button>

</form>
<a href="{% url 'cobranza:citas'}"> Cancelar</a>

{% endblock %}
