{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="description" name="spa med tu espacio ideal">
    <title>{% block title%} My Space Med {%endblock%}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </link>
    <link rel="stylesheet" href="{% static 'cobranza/css/style.css' %}">
    </link>


</head>


<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'cobranza:home' %}">Mi Spa</a>
            <div>
                <a class="nav-link d-inline" href="{% url 'cobranza:home' %}">Inicio</a>
                <a class="nav-link d-inline" href="{% url 'cobranza:servicios' %}">Servicios</a>
                <a class="nav-link d-inline" href="{% url 'cobranza:contacto' %}">Contacto</a>
            </div>
        </div>
    </nav>


    <div class="container mt-4">
        {%block content%}
        {%endblock%}
    </div>

    <footer class="text-center mt-5">
        <p>@Tu Space Med 2026</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'cobranza/js/auth.js' %}"></script>
</body>

</html>
